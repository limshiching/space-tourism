<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400&family=Bellefair&display=swap"

        <a href="index.html" class="logo">

        <button

          aria-controls="mobile-nav"
          aria-expanded="false"

            src="./assets/shared/icon-hamburger.svg"

          <a class="tp-8 is-active" href="index.html"><span>00</span> Home</a>

        <nav class="main-nav">
          <a href="index.html" class="tp-8 is-active"><span>00</span>Home</a>
          <a href="destination.html" class="tp-8"
            ><span>01</span> Destination</a
          >
          <a href="crew.html" class="tp-8"><span>02</span> Crew</a>
          <a href="technology.html" class="tp-8"><span>03</span> Technology</a>
        </nav>

    <!-- So, you want to travel to Space Let’s face it; if you want to go to space,
    you might as well genuinely go to outer space and not hover kind of on the
    edge of it. Well sit back, and relax because we’ll give you a truly out of
    this world experience! Explore -->
